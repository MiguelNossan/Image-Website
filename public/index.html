<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.html/fonts.css">
    <link rel="stylesheet" href="css/index.html/style.css">
    <link rel="stylesheet" href="css/index.html/header.css"> 
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <button id="showLoginForm" class="headerBtn loggedOutHeaderBtn openSans">Log In</button> 
        <button id="showSignUpForm" class="headerBtn loggedOutHeaderBtn openSans">Sign Up</button> 
        <button id="goToHomePage" class="headerBtn loggedInHeaderBtn openSans">Home</button>
        <button id="logOutBtn" class="headerBtn loggedInHeaderBtn openSans">Log Out</button>
        <button id="showDeleteAcctForm" class="headerBtn loggedInHeaderBtn openSans">Del Acct</button>
        <button id="goToUploadPage" class="headerBtn loggedInHeaderBtn openSans">Upload</button> 
        <button id="goToProfilePage" class="headerBtn loggedInHeaderBtn openSans" title="This feature will be available in a future update.">You</button> 
        <button id="goToFollowingPage" class="headerBtn loggedInHeaderBtn openSans">Following</button>
    </header>
     <main>
        <div id="imgDiv">
            <img id="postImg" src="">
            <img title="Like" id="like" src="styleImages/heartWB.png" >
            <img title="Follow" id="follow" src="styleImages/follow.png">
            <h2 id="imgH2" class="playfairDisplay"></h2>
        </div>

        <div id="loader"></div>

        <form id="lisuForm" class="merriweather">
            <img id="closeBtn" title="Close" src="styleImages/close.png" alt="Close">
            <h1 id="lisuH1"></h1>
            <label class="lisuLabel">
                Name <br>
                <input id="lisuInput1" type="text" minlength="3" maxlength="20" placeholder="e.g. Baguette" required>
            </label> <br>
            <label class="lisuLabel">
                Password <br>
                <input id="lisuInput2" type="password" minlength="4" maxlength="100" required>
            </label> <br>
            <button id="lisuSubmitBtn" type="submit"></button>
        </form>
    </main>

    <div id="followingSite">
        <h2>Following:</h2>
        <div id="followingList">
            
        </div>
    </div>

    <div id="channelSite">
        <h2 id="channelSiteH2">MiguelleGazelle</h2>
        <div id="channelContent"></div>
    </div>

    <img id="imageProbe" style="display: none;">
 

    <script src="js/index.html/style.js"></script>
    <script src="js/index.html/logic.js" type="module"></script>
</body>
</html>
